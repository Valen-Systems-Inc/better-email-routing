<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Core Mail</title>
    <link rel="icon" href="/assets/core-mail-icon.png">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <aside class="rail" aria-label="Mailbox">
        <div class="brand">
          <img class="brand-mark" src="/assets/core-mail-icon.png" alt="" aria-hidden="true">
          <div class="brand-copy">
            <strong>Core Mail</strong>
            <span class="brand-tagline">by Valen Systems</span>
            <span id="inboxAddress">Cloudflare mail</span>
          </div>
        </div>

        <button class="compose-button" type="button" data-view="compose">Compose</button>

        <nav class="nav-list" aria-label="Mail sections">
          <button class="nav-item active" type="button" data-mailbox="inbox">
            <span class="nav-icon" aria-hidden="true">I</span>
            <span>Inbox</span>
            <span class="nav-count" data-count="inbox">0</span>
          </button>
          <button class="nav-item" type="button" data-mailbox="sent">
            <span class="nav-icon" aria-hidden="true">S</span>
            <span>Sent</span>
            <span class="nav-count" data-count="sent">0</span>
          </button>
          <button class="nav-item" type="button" data-mailbox="all">
            <span class="nav-icon" aria-hidden="true">A</span>
            <span>All Mail</span>
            <span class="nav-count" data-count="all">0</span>
          </button>
          <button class="nav-item" type="button" data-mailbox="archive">
            <span class="nav-icon" aria-hidden="true">R</span>
            <span>Archive</span>
            <span class="nav-count" data-count="archive">0</span>
          </button>
          <button class="nav-item" type="button" data-mailbox="trash">
            <span class="nav-icon" aria-hidden="true">T</span>
            <span>Trash</span>
            <span class="nav-count" data-count="trash">0</span>
          </button>
        </nav>

        <section class="status-card" aria-live="polite">
          <span class="eyebrow">Service</span>
          <strong id="serviceState">Checking...</strong>
          <span id="serviceMeta">Local server</span>
          <div class="status-actions">
            <button class="secondary-button small" type="button" id="setupButton">Setup</button>
            <button class="secondary-button small" type="button" id="updateButton">Check updates</button>
          </div>
        </section>
      </aside>

      <section class="workspace" aria-label="Core Mail">
        <header class="topbar">
          <div class="topbar-title">
            <h1 id="pageTitle">Inbox</h1>
            <p id="pageSubtitle">inbox@example.com</p>
          </div>
          <div class="topbar-actions">
            <label class="search-field">
              <span>Search</span>
              <input id="searchInput" type="search" autocomplete="off">
            </label>
            <button class="secondary-button" type="button" id="clearSearchButton" hidden>Clear</button>
            <button class="secondary-button" type="button" id="refreshButton">Refresh</button>
          </div>
        </header>

        <section class="view mailbox-view" data-view-panel="mailbox" aria-label="Mailbox">
          <div class="mailbox-grid">
            <section class="thread-column" aria-label="Threads">
              <div class="section-heading compact">
                <h2>Threads</h2>
                <span id="threadStatus">Loading</span>
              </div>
              <div class="triage-panel" aria-label="Mailbox triage">
                <div class="triage-stats" id="triageStats"></div>
                <div class="quick-filters" id="quickFilters" aria-label="Quick filters">
                  <button class="filter-chip active" type="button" data-filter="all">All</button>
                  <button class="filter-chip" type="button" data-filter="unread">Unread</button>
                  <button class="filter-chip" type="button" data-filter="needsReply">Needs reply</button>
                  <button class="filter-chip" type="button" data-filter="awaiting">Awaiting</button>
                  <button class="filter-chip" type="button" data-filter="attachments">Files</button>
                </div>
                <div class="bulk-toolbar" id="bulkToolbar" hidden>
                  <label class="select-all-control">
                    <input id="selectVisibleThreads" type="checkbox">
                    <span id="selectionCount">0 selected</span>
                  </label>
                  <div class="bulk-actions">
                    <button class="secondary-button small" type="button" data-bulk-action="read">Read</button>
                    <button class="secondary-button small" type="button" data-bulk-action="unread">Unread</button>
                    <button class="secondary-button small" type="button" data-bulk-action="archive">Archive</button>
                    <button class="secondary-button small" type="button" data-bulk-action="trash">Trash</button>
                    <button class="text-button small" type="button" id="clearSelectionButton">Clear</button>
                  </div>
                </div>
              </div>
              <div class="thread-list" id="threadList"></div>
            </section>

            <section class="message-column" aria-label="Conversation" hidden>
              <div class="thread-header">
                <div class="thread-title-block">
                  <h2 id="threadSubject">No thread selected</h2>
                  <span id="threadMeta"></span>
                </div>
                <div class="thread-actions" id="threadActions" hidden>
                  <button class="secondary-button small" type="button" id="markButton">Unread</button>
                  <button class="secondary-button small" type="button" id="archiveButton">Archive</button>
                  <button class="secondary-button small" type="button" id="deleteButton">Delete</button>
                  <button class="secondary-button small" type="button" id="restoreButton" hidden>Restore</button>
                  <button class="danger-button small" type="button" id="permanentDeleteButton" hidden>Delete forever</button>
                </div>
              </div>

              <div class="message-stack" id="threadMessages"></div>

              <form class="reply-box" id="replyForm" hidden>
                <div class="reply-meta">
                  <strong>Reply</strong>
                  <span id="replyRecipient"></span>
                </div>
                <div class="reply-tools">
                  <button class="secondary-button small" type="button" id="replyAllButton">Reply all</button>
                  <span id="replyCcPreview"></span>
                </div>
                <label id="replyCcRow" hidden>
                  <span>Cc</span>
                  <input id="replyCc" autocomplete="email">
                </label>
                <label>
                  <span>Message</span>
                  <textarea id="replyText" rows="5" required></textarea>
                </label>
                <div class="send-row">
                  <div id="replyStatus" class="send-status" aria-live="polite"></div>
                  <button class="primary-button" type="submit" id="replyButton">Send reply</button>
                </div>
              </form>
            </section>
          </div>
        </section>

        <section class="view" data-view-panel="compose" hidden aria-label="Email composer">
          <form class="composer" id="composer">
            <div class="field-row">
              <label>
                <span>From</span>
                <select id="from" name="from" required></select>
              </label>
              <label>
                <span>To</span>
                <input id="to" name="to" autocomplete="email" required>
              </label>
            </div>

            <div class="cc-row" id="ccRow" hidden>
              <label>
                <span>Cc</span>
                <input id="cc" name="cc" autocomplete="email">
              </label>
              <label>
                <span>Bcc</span>
                <input id="bcc" name="bcc" autocomplete="email">
              </label>
            </div>

            <div class="utility-row">
              <button class="text-button" type="button" id="toggleCcButton">Cc / Bcc</button>
              <button class="text-button" type="button" id="fillTestButton">Use test note</button>
            </div>

            <label>
              <span>Subject</span>
              <input id="subject" name="subject" required>
            </label>

            <label>
              <span>Message</span>
              <textarea id="text" name="text" rows="13" required></textarea>
            </label>

            <div class="send-row">
              <div id="sendStatus" class="send-status" aria-live="polite"></div>
              <button class="primary-button" type="submit" id="sendButton">Send</button>
            </div>
          </form>
        </section>
      </section>
    </main>

    <section class="modal-backdrop" id="setupModal" hidden aria-label="Cloudflare setup">
      <form class="setup-panel" id="setupForm">
        <header class="setup-header">
          <div>
            <span class="eyebrow">First run</span>
            <h2>Cloudflare Setup</h2>
          </div>
          <button class="secondary-button small" type="button" id="closeSetupButton">Close</button>
        </header>

        <div class="setup-grid">
          <section class="setup-column">
            <div class="setup-steps" id="setupSteps"></div>
            <div class="setup-path" id="setupPath"></div>
          </section>

          <section class="setup-column">
            <section class="connect-card" aria-label="Cloudflare login">
              <div class="connect-copy">
                <span class="eyebrow">Recommended</span>
                <strong>Connect Cloudflare</strong>
                <p id="cloudflareConnectStatus">Checking OAuth support...</p>
              </div>
              <div class="connect-actions">
                <button class="primary-button" type="button" id="connectCloudflareButton">Connect</button>
                <button class="secondary-button" type="button" id="disconnectCloudflareButton" hidden>Disconnect</button>
              </div>
              <label class="account-select-row" id="setupAccountSelectRow" hidden>
                <span>Cloudflare account</span>
                <select id="setupAccountSelect"></select>
              </label>
            </section>

            <div class="field-row">
              <label>
                <span>Sender address</span>
                <input id="setupDefaultFrom" name="defaultFrom" autocomplete="email" required>
              </label>
              <label>
                <span>Label</span>
                <input id="setupDefaultFromLabel" name="defaultFromLabel">
              </label>
            </div>

            <label>
              <span>Default recipient</span>
              <input id="setupDefaultTo" name="defaultTo" autocomplete="email">
            </label>

            <label>
              <span>Cloudflare account ID</span>
              <input id="setupAccountId" name="accountId" autocapitalize="off" spellcheck="false">
            </label>

            <label>
              <span>Email Service API token</span>
              <input id="setupApiToken" name="cloudflareApiToken" type="password" autocomplete="off">
              <small id="setupApiTokenHint"></small>
            </label>

            <label>
              <span>Mailbox Worker URL</span>
              <input id="setupMailboxWorkerUrl" name="mailboxWorkerUrl" autocapitalize="off" spellcheck="false" placeholder="https://your-worker.example.workers.dev">
            </label>

            <label>
              <span>Mailbox API secret</span>
              <input id="setupMailboxApiSecret" name="mailboxApiSecret" type="password" autocomplete="off">
              <small id="setupMailboxSecretHint"></small>
            </label>

            <div class="setup-actions">
              <a class="text-button" id="cloudflareOauthLink" href="https://developers.cloudflare.com/fundamentals/oauth/create-an-oauth-client/" target="_blank" rel="noreferrer">Cloudflare OAuth docs</a>
              <button class="primary-button" type="submit" id="saveSetupButton">Save setup</button>
            </div>

            <div class="send-status" id="setupSaveStatus" aria-live="polite"></div>
          </section>
        </div>
      </form>
    </section>

    <div class="toast" id="mailboxStatus" aria-live="polite"></div>

    <script src="/layout-metrics.js"></script>
    <script src="/email-rendering.js"></script>
    <script src="/mailbox-state.js"></script>
    <script src="/message-body-state.js"></script>
    <script src="/thread-triage.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
