name: release-macos

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Check
        run: npm run check

      - name: Test
        run: npm test

      - name: Build DMG
        run: npm run app:dmg

      - name: Upload app artifacts
        uses: actions/upload-artifact@v4
        with:
          name: better-email-routing-macos
          path: release/*
